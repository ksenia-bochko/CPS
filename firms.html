<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ремонт техники различных брендов</title>
    <link rel="stylesheet" href="firms.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>
    <div class="container">
        <h1>Ремонт техники различных брендов</h1>

        <div class="firms swiper">
            <div class="swiper-wrapper">
                <div class="firms__item swiper-slide">
                    <img src="img/firms/Lenovo.svg" alt="Lenovo" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Samsung.svg" alt="Samsung" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Apple.svg" alt="Apple" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/ViewSonic.svg" alt="ViewSonic" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Bosch.svg" alt="Bosch" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/HP.svg" alt="HP" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Acer.svg" alt="Acer" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Sony.svg" alt="Sony" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Lenovo.svg" alt="Lenovo" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Samsung.svg" alt="Samsung" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Apple.svg" alt="Apple" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>
            </div>

        <div class="swiper-pagination"></div>
    </div>
        <button class="more__btn">
            <img src="img/read_more_icon.svg" alt="" class="more__icon">
            <span class="btn-text">Показать все</span>
        </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="firms.js"></script>
</body>
</html>
