<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ремонт техники различных брендов</title>
    <link rel="stylesheet" href="firms.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script defer src="firms.js"></script>
</head>
<body>

        <h1 class="container">Ремонт техники различных брендов</h1>

        <div class="firms swiper container">
            <div class="swiper-wrapper">
                <div class="firms__item swiper-slide">
                    <img src="img/firms/Lenovo.png" alt="Lenovo" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Samsung.png" alt="Samsung" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Apple.png" alt="Apple" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/ViewSonic.png" alt="ViewSonic" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Bosch.png" alt="Bosch" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/HP.png" alt="HP" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Acer.png" alt="Acer" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Sony.png" alt="Sony" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Lenovo.png" alt="Lenovo" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Samsung.png" alt="Samsung" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>

                <div class="firms__item swiper-slide">
                    <img src="img/firms/Apple.png" alt="Apple" class="item__logo">
                    <a href="#" class="item__btn"><img src="img/firms/buttonGo.svg" alt=""></a>
                </div>
            </div>

        <div class="swiper-pagination"></div>
    </div>
        <button class="more__btn container">
            <img src="img/read_more_icon.svg" alt="" class="more__icon">
            <span class="btn-text">Показать все</span>
        </button>

</body>
</html>
